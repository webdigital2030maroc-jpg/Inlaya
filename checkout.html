<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | INLAYA PARIS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="topbar">
<p>Livraison gratuite pour toute commande supérieure à 100€</p>
</div>


<header class="header">

<div class="brand">

<img src="images/Inlaya-paris.png" class="brand-logo">

<h1 class="brand-title">
INLAYA PARIS
</h1>

</div>


<button class="menu-btn" id="menuBtn">
☰
</button>


<nav class="nav">

<a href="index.html">
Accueil
</a>

<a href="cart.html">
Panier 🛒
</a>

</nav>

</header>



<div class="mobile-menu" id="mobileMenu">

<a href="index.html">
Accueil
</a>

<a href="cart.html">
Panier 🛒
</a>

</div>



<section class="section">

<div class="section-head">

<h2>

Paiement

</h2>

</div>


<div class="checkout-box">


<h3>Informations personnelles</h3>

<input id="prenom" placeholder="Prénom">

<input id="nom" placeholder="Nom">

<input id="telephone" placeholder="Téléphone">

<input id="email" placeholder="Email">



<h3>Adresse de livraison</h3>

<input id="adresse" placeholder="Adresse">

<input id="ville" placeholder="Ville">


<select id="pays">

<option value="France">🇫🇷 France</option>
<option value="Belgique">🇧🇪 Belgique</option>
<option value="Suisse">🇨🇭 Suisse</option>
<option value="Luxembourg">🇱🇺 Luxembourg</option>

<option value="Espagne">🇪🇸 Espagne</option>
<option value="Portugal">🇵🇹 Portugal</option>
<option value="Italie">🇮🇹 Italie</option>
<option value="Allemagne">🇩🇪 Allemagne</option>
<option value="Pays-Bas">🇳🇱 Pays-Bas</option>

<option value="Autriche">🇦🇹 Autriche</option>
<option value="Irlande">🇮🇪 Irlande</option>
<option value="Danemark">🇩🇰 Danemark</option>
<option value="Suède">🇸🇪 Suède</option>
<option value="Norvège">🇳🇴 Norvège</option>
<option value="Finlande">🇫🇮 Finlande</option>
<option value="Pologne">🇵🇱 Pologne</option>

<option value="Royaume-Uni">🇬🇧 Royaume-Uni</option>

<option value="États-Unis">🇺🇸 États-Unis</option>
<option value="Canada">🇨🇦 Canada</option>

<option value="Maroc">🇲🇦 Maroc</option>
<option value="Algérie">🇩🇿 Algérie</option>
<option value="Tunisie">🇹🇳 Tunisie</option>
<option value="Palestine">🇵🇸 Palestine</option>

<option value="Arabie saoudite">🇸🇦 Arabie saoudite</option>
<option value="Émirats arabes unis">🇦🇪 Émirats arabes unis</option>
<option value="Qatar">🇶🇦 Qatar</option>
<option value="Koweït">🇰🇼 Koweït</option>
<option value="Bahreïn">🇧🇭 Bahreïn</option>
<option value="Oman">🇴🇲 Oman</option>

</select>



<textarea id="note"

placeholder="Instructions de livraison">

</textarea>



<div class="resume">

<h3>

Votre commande

</h3>


<div id="checkout-items">

</div>


<h4 id="checkout-total">

Total : 0 €

</h4>


</div>



<button class="btn btn-dark"

onclick="sendWhatsApp()">

Confirmer ma commande

</button>


</div>

</section>


<script src="script.js"></script>

</body>

</html>
