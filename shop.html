<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop - Ilyan Sarah</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <p>Shop all collections</p>
  </div>

  <header class="header">
    <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>

    <a href="index.html" class="logo">
      <span>ilyan.sarah</span>
    </a>

    <nav class="nav" id="navMenu">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="index.html#collections">Collections</a>
      <a href="index.html#about">About</a>
      <a href="index.html#contact">Contact</a>
    </nav>

    <div class="icons">
      <a href="#">♡</a>
      <a href="#">🛒</a>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="index.html#collections">Collections</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </div>

  <section class="page-hero">
    <h1>Shop Collection</h1>
    <p>هنا كتزيد جميع المنتجات ديالك من بعد.</p>
  </section>

  <section class="section">
    <div class="shop-layout">
      <aside class="filters">
        <h2>Filters</h2>
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Dresses</button>
        <button class="filter-btn">Sets</button>
        <button class="filter-btn">Shoes</button>
        <button class="filter-btn">Accessories</button>

        <!-- Leave space to add more filters later -->
      </aside>

      <div class="product-grid">
        <article class="product-card">
          <img src="images/product-1.jpg" alt="Product">
          <h3>Binta Set</h3>
          <p>€99.99</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <img src="images/product-2.jpg" alt="Product">
          <h3>Sports Outfit</h3>
          <p>€99.99</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <img src="images/product-3.jpg" alt="Product">
          <h3>Sports Set</h3>
          <p>€99.99</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <img src="images/product-1.jpg" alt="Product">
          <h3>New Look</h3>
          <p>€89.99</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <img src="images/product-2.jpg" alt="Product">
          <h3>Elegant Set</h3>
          <p>€109.99</p>
          <button>Add to cart</button>
        </article>

        <article class="product-card">
          <img src="images/product-3.jpg" alt="Product">
          <h3>Casual Style</h3>
          <p>€79.99</p>
          <button>Add to cart</button>
        </article>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
